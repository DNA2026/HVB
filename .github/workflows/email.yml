name: Hodinová kontrola Gmailu a Telegram notifikace

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch: # Tlačítko pro ruční spuštění

jobs:
  check-and-notify:
    runs-on: ubuntu-latest

    steps:
    - name: Nastavení Pythonu
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Kontrola Gmailu a odeslání na Telegram
      env:
        GMAIL_USERNAME: ${{ secrets.GMAIL_USERNAME }}
        GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: |
        python - <<EOF
        import imaplib
        import urllib.request
        import urllib.parse
        import os

        try:
            # 1. Přihlášení do Gmailu
            mail = imaplib.IMAP4_SSL('imap.gmail.com', 993)
            mail.login(os.environ['GMAIL_USERNAME'], os.environ['GMAIL_APP_PASSWORD'])
            
            # Výběr složky
            status, data = mail.select('INBOX/Octopus')
            
            if status != 'OK':
                raise Exception("Složka INBOX/Octopus nebyla nalezena.")

            # Oprava vyhledávání: Použijeme čistý filtr bez specifikace znakové sady (None nahradíme prázdným vyhledáváním)
            # Některé verze IMAP vyžadují uvozovky nebo velká písmena bez dalších argumentů
            status, response = mail.search(None, '(UNREAD)')

            unread_count = 0
            if status == 'OK' and response[0]:
                unread_count = len(response[0].split())
            
            mail.logout()

            if unread_count > 0:
                message = f"🟢 Kontrola Gmailu: Ve složce INBOX/Octopus máš {unread_count} nepřečtených e-mailů."
            else:
                message = "⚪ Kontrola Gmailu: Žádné nové maily ve složce INBOX/Octopus."

        except Exception as e:
            message = f"🔴 Chyba při kontrole Gmailu: {str(e)}"

        # 2. Odeslání na Telegram
        bot_token = os.environ['TELEGRAM_BOT_TOKEN']
        chat_id = os.environ['TELEGRAM_CHAT_ID']
        url = f"https://api.telegram.org/bot{bot_token}/sendMessage"
        
        data = urllib.parse.urlencode({'chat_id': chat_id, 'text': message}).encode('utf-8')
        req = urllib.request.Request(url, data=data)
        
        try:
            urllib.request.urlopen(req)
            print("Zpráva odeslána na Telegram.")
        except Exception as telegram_error:
            print(f"Chyba Telegramu: {telegram_error}")
        EOF
