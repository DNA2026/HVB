name: Automatizace OCTO

on:
  schedule:
    - cron: '0 14 * * MON-FRI'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-octo:
    runs-on: ubuntu-latest
    steps:
      - name: Stazeni kodu z GitHubu
        uses: actions/checkout@v4

      - name: Nastaveni Pythonu a knihoven
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalace pip balicku
        run: pip install pandas requests openrouteservice gdown openpyxl ipython folium

      - name: Priprava prostredi Colabu a stahnuti dat
        env:
          FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
        run: |
          # Vytvoříme přesnou strukturu složek, do které OCTO.py zapisuje a ze které čte
          sudo mkdir -p /content/drive/MyDrive/HVB
          sudo chmod -R 777 /content
          
          # Stáhneme zdrojové soubory z Google Disku přímo do této složky
          gdown --folder "$FOLDER_ID" -O /content/drive/MyDrive/HVB
          
          # Pro jistotu zrcadlíme do aktuálního adresáře pro případné relativní importy
          cp -r /content/drive/MyDrive/HVB/* . || true

      - name: Spusteni Python skriptu OCTO
        env:
          ORS_TOKEN_SECRET: ${{ secrets.OPENROUTESERVICE_TOKEN }}
        run: |
          # Spustíme plnou verzi skriptu se stoprocentní simulací prostředí Colabu
          python -c "
          import sys, types, os
          
          m_drive = types.ModuleType('google.colab.drive')
          m_drive.mount = lambda *a, **k: None
          
          m_user = types.ModuleType('google.colab.userdata')
          m_user.get = lambda key: os.environ.get('ORS_TOKEN_SECRET')

          m_files = types.ModuleType('google.colab.files')
          m_files.download = lambda *a, **k: None
          m_files.upload = lambda *a, **k: {}

          m_output = types.ModuleType('google.colab.output')
          m_output.clear = lambda *a, **k: None
          
          m_colab = types.ModuleType('google.colab')
          m_colab.drive = m_drive
          m_colab.userdata = m_user
          m_colab.files = m_files
          m_colab.output = m_output
          
          sys.modules['google.colab.drive'] = m_drive
          sys.modules['google.colab.userdata'] = m_user
          sys.modules['google.colab.files'] = m_files
          sys.modules['google.colab.output'] = m_output
          sys.modules['google.colab'] = m_colab
          
          # Spuštění ostrého kódu. Bez try-except, pokud nastane chyba v Pythonu, hned ji uvidíme.
          exec(open('OCTO.py', encoding='utf-8').read())
          "

      - name: Ulozeni vygenerovaneho HTML na GitHub web
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          
          # KLÍČOVÝ KROK: Vezmeme Dashboard.html a ostatní soubory z Colab složky 
          # a přesuneme je přímo sem do kořene repozitáře, aby je Git mohl nahrát.
          cp /content/drive/MyDrive/HVB/Dashboard.html ./Dashboard.html 2>/dev/null || cp Dashboard.html ./Dashboard.html 2>/dev/null || true
          cp /content/drive/MyDrive/HVB/mapa_zakazky.html ./mapa_zakazky.html 2>/dev/null || cp mapa_zakazky.html ./mapa_zakazky.html 2>/dev/null || true
          cp /content/drive/MyDrive/HVB/vystup_komplet_final_v3.zip ./vystup_komplet_final_v3.zip 2>/dev/null || cp vystup_komplet_final_v3.zip ./vystup_komplet_final_v3.zip 2>/dev/null || true
          cp /content/drive/MyDrive/HVB/whatsapp_vystup_finalni.txt ./whatsapp_vystup_finalni.txt 2>/dev/null || cp whatsapp_vystup_finalni.txt ./whatsapp_vystup_finalni.txt 2>/dev/null || true
          cp /content/drive/MyDrive/HVB/email_shrnuti.txt ./email_shrnuti.txt 2>/dev/null || cp email_shrnuti.txt ./email_shrnuti.txt 2>/dev/null || true
          cp /content/drive/MyDrive/HVB/ORS_komplet.txt ./ORS_komplet.txt 2>/dev/null || cp ORS_komplet.txt ./ORS_komplet.txt 2>/dev/null || true
          
          # Přidáme pouze tyto explicitní výstupy, které se mají nahrát. Obří databáze (.csv, .xlsx) vynecháváme.
          git add Dashboard.html mapa_zakazky.html vystup_komplet_final_v3.zip whatsapp_vystup_finalni.txt email_shrnuti.txt ORS_komplet.txt 2>/dev/null || true
          
          # Commit a Push provedeme tak, aby při nulové změně v inzerátech akce nespadla.
          git commit -m "Automatická aktualizace webu z OCTO.py" && git push || echo "Žádné nové změny k nahrání."
