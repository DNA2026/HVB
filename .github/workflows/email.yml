name: Hodinová kontrola Gmailu a Telegram notifikace

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch: # Tlačítko pro ruční spuštění

jobs:
  check-and-notify:
    runs-on: ubuntu-latest

    steps:
    - name: Nastavení Pythonu
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Kontrola Gmailu a odeslání na Telegram
      env:
        GMAIL_USERNAME: ${{ secrets.GMAIL_USERNAME }}
        GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: |
        python - <<EOF
        import imaplib
        import urllib.request
        import urllib.parse
        import os

        try:
            # 1. Přihlášení do Gmailu
            mail = imaplib.IMAP4_SSL('imap.gmail.com', 993)
            mail.login(os.environ['GMAIL_USERNAME'], os.environ['GMAIL_APP_PASSWORD'])
            
            # Vybereme hlavní schránku (Inbox), abychom v ní mohli vyhledávat pomocí štítků
            mail.select('inbox')
            
            # Použijeme nativní vyhledávání Gmailu (X-GM-RAW). 
            # Zkusíme variantu s lomítkem i bez, pro jistotu se podíváme na 'label:inbox-octopus is:unread' i 'label:inbox/octopus'
            # Vyhledáme prostě všechny nepřečtené e-maily, které obsahují v názvu štítku "octopus"
            status, response = mail.uid('search', None, 'X-GM-RAW', 'has:nouserlabels is:unread octopus')
            
            # Pokud by to nenašlo, zkusíme záložní přesný dotaz na tvůj formát složky
            if status != 'OK' or not response[0]:
                status, response = mail.uid('search', None, 'X-GM-RAW', 'label:inbox-octopus is:unread')
                
            if status != 'OK' or not response[0]:
                status, response = mail.uid('search', None, 'X-GM-RAW', 'label:inbox/octopus is:unread')

            unread_count = 0
            if status == 'OK' and response[0]:
                unread_count = len(response[0].split())
            
            mail.logout()

            if unread_count > 0:
                message = f"🟢 Kontrola Gmailu: Ve složce/štítku octopus máš {unread_count} nepřečtených e-mailů."
            else:
                message = "⚪ Kontrola Gmailu: Žádné nové maily ve složce octopus."

        except Exception as e:
            message = f"🔴 Chyba při kontrole Gmailu: {str(e)}"

        # 2. Odeslání na Telegram
        bot_token = os.environ['TELEGRAM_BOT_TOKEN']
        chat_id = os.environ['TELEGRAM_CHAT_ID']
        url = f"https://api.telegram.org/bot{bot_token}/sendMessage"
        
        data = urllib.parse.urlencode({'chat_id': chat_id, 'text': message}).encode('utf-8')
        req = urllib.request.Request(url, data=data)
        
        try:
            urllib.request.urlopen(req)
            print("Zpráva odeslána na Telegram.")
        except Exception as telegram_error:
            print(f"Chyba Telegramu: {telegram_error}")
        EOF
