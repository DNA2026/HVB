name: Automatizace OCTO

on:
  schedule:
    - cron: '0 14 * * MON-FRI'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-octo:
    runs-on: ubuntu-latest
    steps:
      - name: Stazeni kodu z GitHubu
        uses: actions/checkout@v4

      - name: Nastaveni Pythonu a knihoven
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalace pip balicku
        run: pip install pandas requests openrouteservice gdown openpyxl

      - name: Priprava souboru z Google Disku a Tokenu
        env:
          FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
        run: |
          # Stáhneme obsah Google Disku do dočasné složky
          gdown --folder "$FOLDER_ID" -O data_temp
          
          # Vytvoříme si lokální složku HVB přímo v našem pracovním adresáři
          mkdir -p HVB
          cp -r data_temp/* HVB/
          cp -r data_temp/* . || true
          
          # Vytvoření tokenu v souboru pro starší verze
          echo "${{ secrets.OPENROUTESERVICE_TOKEN }}" > ors_token.txt

      - name: Spusteni Python skriptu OCTO
        env:
          ORS_TOKEN_SECRET: ${{ secrets.OPENROUTESERVICE_TOKEN }}
        run: |
          python -c "
          import sys, types, os, builtins

          # 1. Přesměrování cest z Colabu (/content/...) do naší lokální složky HVB
          original_open = builtins.open
          def patched_open(file, *args, **kwargs):
              if isinstance(file, str) and '/content/drive/MyDrive/HVB' in file:
                  file = file.replace('/content/drive/MyDrive/HVB', './HVB')
              return original_open(file, *args, **kwargs)
          builtins.open = patched_open

          # Oprava pro pandas a další knihovny, které používají os.path
          original_listdir = os.listdir
          def patched_listdir(path='.'):
              if isinstance(path, str) and '/content/drive/MyDrive/HVB' in path:
                  path = path.replace('/content/drive/MyDrive/HVB', './HVB')
              return original_listdir(path)
          os.listdir = patched_listdir

          # 2. Komplexní simulace google.colab
          m_drive = types.ModuleType('google.colab.drive')
          m_drive.mount = lambda *a, **k: None
          
          m_user = types.ModuleType('google.colab.userdata')
          m_user.get = lambda key: os.environ.get('ORS_TOKEN_SECRET')
          
          m_colab = types.ModuleType('google.colab')
          m_colab.drive = m_drive
          m_colab.userdata = m_user
          
          sys.modules['google.colab.drive'] = m_drive
          sys.modules['google.colab.userdata'] = m_user
          sys.modules['google.colab'] = m_colab
          
          # 3. Spuštění samotného skriptu
          exec(open('OCTO.py').read())
          "

      - name: Ulozeni vygenerovaneho HTML na GitHub web
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          
          # Zkopírujeme výsledné HTML, ať už vzniklo v hlavní složce nebo v podadresáři HVB
          cp HVB/index.html ./index.html || cp HVB/vystup.html ./index.html || cp index.html ./index.html || true
          
          git add index.html
          git diff --quiet && git diff --staged --quiet || (git commit -m "Automatická aktualizace webu z OCTO.py" && git push)
