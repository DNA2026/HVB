name: Notifikace aktualizace Dashboardu

on:
  push:
    paths:
      - 'Dashboard.html' # Kód se spustí JEN při změně tohoto souboru
  workflow_dispatch: # Tlačítko pro ruční spuštění (zůstává pro test)

jobs:
  check_changes:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Poslat notifikaci na Telegram
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: |
        curl -s -X POST "https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/sendMessage" \
          -d "chat_id=$TELEGRAM_CHAT_ID" \
          -d "text=Přehled realitní inzerce byl aktualizován"
