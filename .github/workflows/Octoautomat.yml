name: Automatizace OCTO

on:
  schedule:
    - cron: '0 14 * * MON-FRI'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-octo:
    runs-on: ubuntu-latest
    steps:
      - name: Stazeni kodu z GitHubu
        uses: actions/checkout@v4

      - name: Nastaveni Pythonu a knihoven
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalace pip balicku
        run: pip install pandas requests openrouteservice gdown openpyxl

      - name: Priprava prostředí Colabu a stáhnutí dat
        env:
          FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
        run: |
          # 1. Vytvoříme SKUTEČNOU složku /content/drive/MyDrive/HVB v systému přes sudo
          sudo mkdir -p /content/drive/MyDrive/HVB
          
          # 2. Nastavíme plná práva, aby do ní mohl skript zapisovat a číst
          sudo chmod -R 777 /content
          
          # 3. Stáhneme obsah Google Disku přímo do této složky
          gdown --folder "$FOLDER_ID" -O /content/drive/MyDrive/HVB
          
          # 4. Pro jistotu zkopírujeme soubory i do aktuální složky na GitHubu
          cp -r /content/drive/MyDrive/HVB/* . || true

      - name: Spusteni Python skriptu OCTO
        env:
          ORS_TOKEN_SECRET: ${{ secrets.OPENROUTESERVICE_TOKEN }}
        run: |
          # Spustíme čistý Python, pouze s podvržením knihoven google.colab v paměti
          python -c "
          import sys, types, os
          
          m_drive = types.ModuleType('google.colab.drive')
          m_drive.mount = lambda *a, **k: None
          
          m_user = types.ModuleType('google.colab.userdata')
          m_user.get = lambda key: os.environ.get('ORS_TOKEN_SECRET')

          m_files = types.ModuleType('google.colab.files')
          m_files.download = lambda *a, **k: None
          m_files.upload = lambda *a, **k: {}
          
          m_colab = types.ModuleType('google.colab')
          m_colab.drive = m_drive
          m_colab.userdata = m_user
          m_colab.files = m_files
          
          sys.modules['google.colab.drive'] = m_drive
          sys.modules['google.colab.userdata'] = m_user
          sys.modules['google.colab.files'] = m_files
          sys.modules['google.colab'] = m_colab
          
          exec(open('OCTO.py').read())
          "

      - name: Ulozeni vygenerovaneho HTML na GitHub web
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          
          # Vytáhneme výsledné HTML ze složky /content přímo sem do repozitáře
          cp /content/drive/MyDrive/HVB/index.html ./index.html || cp /content/drive/MyDrive/HVB/vystup.html ./index.html || cp index.html ./index.html || true
          
          git add index.html
          git diff --quiet && git diff --staged --quiet || (git commit -m "Automatická aktualizace webu z OCTO.py" && git push)
