name: Automatizace OCTO

on:
  schedule:
    - cron: '0 14 * * MON-FRI'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-octo:
    runs-on: ubuntu-latest
    steps:
      - name: Stazeni kodu z GitHubu
        uses: actions/checkout@v4

      - name: Nastaveni Pythonu a knihoven
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalace pip balicku
        run: pip install pandas requests openrouteservice gdown openpyxl

      - name: Priprava souboru z Google Disku a Tokenu
        env:
          FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
        run: |
          # Vytvoříme přesnou strukturu složek, kterou skript vyžaduje (/content/drive/MyDrive/HVB)
          mkdir -p /content/drive/MyDrive/HVB
          
          # Stáhneme obsah Google Disku do dočasné složky
          gdown --folder "$FOLDER_ID" -O data_temp
          
          # Zkopírujeme soubory přesně tam, kde je skript v kódu hledá
          cp -r data_temp/* /content/drive/MyDrive/HVB/
          
          # Pro jistotu je zkopírujeme i do aktuální složky
          cp -r data_temp/* . || true

      - name: Spusteni Python skriptu OCTO
        env:
          # Předáme skutečný token z GitHub Secrets do proměnné prostředí
          ORS_TOKEN_SECRET: ${{ secrets.OPENROUTESERVICE_TOKEN }}
        run: |
          python -c "
          import sys, types, os
          # 1. Komplexní simulace google.colab včetně drive a userdata
          m_drive = types.ModuleType('google.colab.drive')
          m_drive.mount = lambda *a, **k: None
          
          m_user = types.ModuleType('google.colab.userdata')
          # Když skript zavolá userdata.get('...'), vrátí mu to token z GitHub Secrets
          m_user.get = lambda key: os.environ.get('ORS_TOKEN_SECRET')
          
          m_colab = types.ModuleType('google.colab')
          m_colab.drive = m_drive
          m_colab.userdata = m_user
          
          sys.modules['google.colab.drive'] = m_drive
          sys.modules['google.colab.userdata'] = m_user
          sys.modules['google.colab'] = m_colab
          
          # 2. Spuštění samotného skriptu
          exec(open('OCTO.py').read())
          "

      - name: Ulozeni vygenerovaneho HTML na GitHub web
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          
          # Pokud tvůj skript vygeneroval HTML do /content/drive/MyDrive/HVB, zkopírujeme ho sem na GitHub
          cp /content/drive/MyDrive/HVB/index.html ./index.html || true
          cp /content/drive/MyDrive/HVB/vystup.html ./index.html || true
          
          git add index.html
          git diff --quiet && git diff --staged --quiet || (git commit -m "Automatická aktualizace webu z OCTO.py" && git push)
