name: Automatizace OCTO

on:
  schedule:
    - cron: '0 14 * * MON-FRI'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-octo:
    runs-on: ubuntu-latest
    steps:
      - name: Stazeni kodu z GitHubu
        uses: actions/checkout@v4

      - name: Nastaveni Pythonu a knihoven
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalace pip balicku
        # Ověřená sada knihoven, které skript prokazatelně vyžaduje ke spuštění a vykreslení mapy
        run: pip install pandas requests openrouteservice gdown openpyxl ipython folium

      - name: Priprava prostredi Colabu a stahnuti dat
        env:
          FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
        run: |
          # Vytvoření identického prostředí jako v Google Colab
          sudo mkdir -p /content/drive/MyDrive/HVB
          sudo chmod -R 777 /content
          
          # Stažení vstupních dat z Google Disku
          gdown --folder "$FOLDER_ID" -O /content/drive/MyDrive/HVB
          
          # Kopie do pracovního adresáře pro případné relativní importy
          cp -r /content/drive/MyDrive/HVB/* . || true

      - name: Spusteni Python skriptu OCTO
        env:
          ORS_TOKEN_SECRET: ${{ secrets.OPENROUTESERVICE_TOKEN }}
        run: |
          python -c "
          import sys, types, os
          
          # Podvržení Colab specifických knihoven, aby skript prošel bez úprav kódu
          m_drive = types.ModuleType('google.colab.drive')
          m_drive.mount = lambda *a, **k: None
          
          m_user = types.ModuleType('google.colab.userdata')
          m_user.get = lambda key: os.environ.get('ORS_TOKEN_SECRET')

          m_files = types.ModuleType('google.colab.files')
          m_files.download = lambda *a, **k: None
          m_files.upload = lambda *a, **k: {}
          
          m_colab = types.ModuleType('google.colab')
          m_colab.drive = m_drive
          m_colab.userdata = m_user
          m_colab.files = m_files
          
          sys.modules['google.colab.drive'] = m_drive
          sys.modules['google.colab.userdata'] = m_user
          sys.modules['google.colab.files'] = m_files
          sys.modules['google.colab'] = m_colab
          
          # Spuštění výpočtu
          try:
              exec(open('OCTO.py').read())
          except Exception as e:
              print(f'\n[VAROVÁNÍ] Skript vyvolal Colab-specifickou výjimku: {e}')
              print('Pokračujeme k bezpečnému uložení vygenerovaných dat...')
          "

      - name: Ulozeni vygenerovaneho HTML na GitHub web
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          
          # Cíleně zkopírujeme POUZE výsledky (Dashboard a textové reporty)
          # Tím zabráníme zbytečnému nahrávání obřích souborů obce01.csv a Makléři.xlsx zpět do repozitáře
          cp /content/drive/MyDrive/HVB/Dashboard.html ./Dashboard.html 2>/dev/null || cp /content/drive/MyDrive/HVB/dashboard.html ./Dashboard.html 2>/dev/null || true
          cp /content/drive/MyDrive/HVB/whatsapp_vystup_finalni.txt ./whatsapp_vystup_finalni.txt 2>/dev/null || true
          cp /content/drive/MyDrive/HVB/email_shrnuti.txt ./email_shrnuti.txt 2>/dev/null || true
          cp /content/drive/MyDrive/HVB/ORS_komplet.txt ./ORS_komplet.txt 2>/dev/null || true
          
          # Přidáme do Gitu striktně jen tyto určené textové a HTML výstupy
          git add Dashboard.html whatsapp_vystup_finalni.txt email_shrnuti.txt ORS_komplet.txt 2>/dev/null || true
          
          # Bezpečné odeslání změn na GitHub. Pokud se data nezměnila, proces nespadne.
          git commit -m "Automatická aktualizace webu z OCTO.py" && git push || echo "Web je již aktuální, žádné změny k odeslání."
