name: Hodinová kontrola Gmailu a Telegram notifikace

on:
  schedule:
    # Tady je to plánování: Spustí se každou celou hodinu (00:00, 01:00 atd. UTC)
    - cron: '53 * * * *'
  workflow_dispatch: # Tlačítko pro ruční spuštění v rozhraní GitHubu

jobs:
  check-and-notify:
    runs-on: ubuntu-latest

    steps:
    - name: Nastavení Pythonu
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Kontrola Gmailu a odeslání na Telegram
      env:
        GMAIL_USERNAME: ${{ secrets.GMAIL_USERNAME }}
        GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: |
        python - <<EOF
        import imaplib
        import urllib.request
        import urllib.parse
        import os

        try:
            # 1. Přihlášení do Gmailu
            mail = imaplib.IMAP4_SSL('imap.gmail.com', 993)
            mail.login(os.environ['GMAIL_USERNAME'], os.environ['GMAIL_APP_PASSWORD'])
            
            # Vstoupíme do hlavní doručené pošty
            mail.select('INBOX')
            
            # VARIANTA 1: Celkový počet nepřečtených mailů v celém INBOXU
            status_all, response_all = mail.search(None, 'UNSEEN')
            all_unread = 0
            if status_all == 'OK' and response_all[0]:
                all_unread = len(response_all[0].split())
                
            # VARIANTA 2: Nepřečtené maily od konkrétního odesílatele
            status_from, response_from = mail.search(None, 'UNSEEN', 'FROM', 'robot@octopuspro.cz')
            octopus_unread = 0
            if status_from == 'OK' and response_from[0]:
                octopus_unread = len(response_from[0].split())
            
            mail.logout()

            # Sestavení přehledné zprávy
            message = (
                f"📊 Výsledek kontroly Gmailu:\n"
                f"▪️ Celkem nepřečtených v doručené poště: {all_unread}\n"
                f"▪️ Nepřečtených od robot@octopuspro.cz: {octopus_unread}"
            )

        except Exception as e:
            message = f"🔴 Chyba při kontrole Gmailu: {str(e)}"

        # 2. Odeslání na Telegram
        bot_token = os.environ['TELEGRAM_BOT_TOKEN']
        chat_id = os.environ['TELEGRAM_CHAT_ID']
        url = f"https://api.telegram.org/bot{bot_token}/sendMessage"
        
        data = urllib.parse.urlencode({'chat_id': chat_id, 'text': message}).encode('utf-8')
        req = urllib.request.Request(url, data=data)
        
        try:
            urllib.request.urlopen(req)
            print("Odesláno.")
        except Exception as telegram_error:
            print(f"Chyba: {telegram_error}")
        EOF
