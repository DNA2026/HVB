name: Automatizace OCTO

on:
  schedule:
    - cron: '0 14 * * MON-FRI'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-octo:
    runs-on: ubuntu-latest
    steps:
      - name: Stazeni kodu z GitHubu
        uses: actions/checkout@v4

      - name: Nastaveni Pythonu a knihoven
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalace pip balicku
        run: pip install pandas requests openrouteservice gdown

      - name: Priprava souboru z Google Disku a Tokenu
        env:
          FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
        run: |
          gdown --folder "$FOLDER_ID" -O data_temp
          cp -r data_temp/* .
          echo "${{ secrets.OPENROUTESERVICE_TOKEN }}" > ors_token.txt

      - name: Spusteni Python skriptu OCTO
        run: |
          python -c "import sys, types; m = types.ModuleType('google.colab.drive'); m.mount = lambda *a, **k: None; sys.modules['google.colab.drive'] = m; sys.modules['google.colab'] = types.ModuleType('google.colab'); sys.modules['google.colab'].drive = m; exec(open('OCTO.py').read())"

      - name: Ulozeni vygenerovaneho HTML na GitHub web
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          git add index.html
          git diff --quiet && git diff --staged --quiet || (git commit -m "Automatická aktualizace webu z OCTO.py" && git push)
