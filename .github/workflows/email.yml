name: Hodinová kontrola Gmailu a Telegram notifikace

on:
  schedule:
    # Spustí se každou celou hodinu (23. minuta UTC)
    - cron: '23 * * * *'
  
  repository_dispatch:
    # Umožní okamžité spuštění z MacroDroidu
    types: [spust_kontrolu]
    
  workflow_dispatch: # Tlačítko pro ruční spuštění v prohlížeči

jobs:
  check-and-notify:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
    - name: Nastavení Pythonu
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Kontrola Gmailu a odeslání na Telegram
      env:
        GMAIL_USERNAME: ${{ secrets.GMAIL_USERNAME }}
        GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: |
        python - <<'PYTHON_EOF'
        import imaplib
        import urllib.request
        import urllib.parse
        import os
        import sys

        def send_telegram_message(message):
            """Odešle zprávu na Telegram"""
            bot_token = os.environ['TELEGRAM_BOT_TOKEN']
            chat_id = os.environ['TELEGRAM_CHAT_ID']
            url = f"https://api.telegram.org/bot{bot_token}/sendMessage"
            
            data = urllib.parse.urlencode({
                'chat_id': chat_id, 
                'text': message,
                'parse_mode': 'HTML'
            }).encode('utf-8')
            
            req = urllib.request.Request(url, data=data)
            
            try:
                response = urllib.request.urlopen(req, timeout=10)
                print("✅ Zpráva úspěšně odeslána na Telegram")
                return True
            except Exception as e:
                print(f"❌ Chyba při odesílání na Telegram: {e}")
                return False

        message = None
        success = True

        try:
            print("🔍 Připojování k Gmailu...")
            mail = imaplib.IMAP4_SSL('imap.gmail.com', 993)
            mail.login(os.environ['GMAIL_USERNAME'], os.environ['GMAIL_APP_PASSWORD'])
            
            mail.select('INBOX')
            
            # Vyhledávání nepřečtených mailů pouze od konkrétního odesílatele
            sender_email = 'robot@octopuspro.cz'
            status_from, response_from = mail.search(None, 'UNSEEN', 'FROM', sender_email)
            octopus_unread = 0
            
            if status_from == 'OK' and response_from[0]:
                message_ids = response_from[0].split()
                octopus_unread = len(message_ids)
            
            print(f"🐙 Nalezeno {octopus_unread} nepřečtených zpráv od {sender_email}")
            
            mail.logout()
            print("✅ Odhlášeno z Gmailu")

            # Zpráva se sestaví a odešle POUZE pokud jsou nalezeny nepřečtené maily
            if octopus_unread > 0:
                message = f"Nepřečtených zpráv od Octopus : {octopus_unread}"
            else:
                print("📭 Žádné nové zprávy od Octopus, notifikace se neposílá.")

        except imaplib.IMAP4.error as e:
            message = f"<b>🔴 Chyba přihlášení k Gmailu:</b>\n{str(e)}"
            print(f"❌ IMAP chyba: {e}")
        except Exception as e:
            message = f"<b>🔴 Neočekávaná chyba:</b>\n{str(e)[:200]}"
            print(f"❌ Obecná chyba: {e}")
            import traceback
            traceback.print_exc()

        # Odeslání na Telegram (pokud je připravena zpráva k odeslání)
        if message:
            success = send_telegram_message(message)
        
        # Exit code pro GitHub Actions
        if not success:
            sys.exit(1)
        PYTHON_EOF
